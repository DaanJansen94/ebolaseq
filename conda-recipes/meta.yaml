{% set name = "ebolaseq" %}
{% set version = "0.2.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/DaanJansen94/ebolaseq/archive/v{{ version }}.tar.gz
  sha256: c21365fcf299b0eabac913cfc2561cf89a902403a9a3103d520e0bf41754c7df

build:
  number: 0
  noarch: python
  entry_points:
    - ebolaseq=ebolaseq.ebolaseq:cli_main
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - biopython >=1.81
    - openpyxl >=3.1
    - numpy >=1.20.0
    - mafft
    - trimal
    - iqtree =2.4.0 #iqtree=2.4.0: more reliable with ebolaseq than v3.0.1
    - minimap2
    - pal2nal
    
test:
  imports:
    - ebolaseq
  commands:
    - ebolaseq --help

about:
  home: https://github.com/DaanJansen94/ebolaseq
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Download, align, and analyze Ebola virus sequences
  description: |
    EbolaSeq is a command-line tool that simplifies the process of analyzing Ebola virus sequences.
    It automates the complete workflow from downloading sequences to creating phylogenetic trees.
    The tool retrieves Ebola virus sequences from NCBI GenBank, processes them according to user
    specifications, performs multiple sequence alignment, and generates phylogenetic trees.
    It also includes in silico screening of GP epitope changes relevant to approved monoclonal
    antibody therapies mAb114 (Ebanga / ansuvimab), REGN-EB3 (Inmazeb; Regeneron), and MBP134 via the
    optional mAb escape report (HTML summary and Excel export for R).
  doc_url: https://github.com/DaanJansen94/ebolaseq/blob/master/README.md
  dev_url: https://github.com/DaanJansen94/ebolaseq

extra:
  recipe-maintainers:
    - DaanJansen94
